<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate AR QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d12; color: #e0e0e0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: .4rem; color: #fff; }
    p.sub { font-size: .85rem; opacity: .5; margin-bottom: 2rem; }
    label { font-size: .8rem; opacity: .7; margin-bottom: .4rem; display: block; }
    input {
      width: 340px; max-width: 90vw; padding: 12px 16px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06); color: #fff;
      font-size: .95rem; outline: none;
      margin-bottom: 1rem;
    }
    input:focus { border-color: #6ee7b7; }
    button {
      padding: 10px 28px; border-radius: 10px; border: none;
      background: #6ee7b7; color: #0a0a0f; font-weight: 700;
      font-size: .9rem; cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #5fd4a8; }
    #qr-box {
      margin-top: 2rem; padding: 24px; background: #fff;
      border-radius: 16px; display: none;
    }
    #qr-box canvas { display: block; }
    .tip { margin-top: 1.4rem; font-size: .78rem; opacity: .45; max-width: 360px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>AR QR Code Generator</h1>
  <p class="sub">Generate a scannable code that opens your AR experience</p>

  <label for="url-input">Your hosted AR page URL</label>
  <input id="url-input" type="url" placeholder="https://your-username.github.io/ar-floorplan/" />
  <button onclick="generate()">Generate QR Code</button>

  <div id="qr-box"></div>
  <p class="tip">Print this QR code and place it on or beside your projected floor plan. Visitors scan it → the AR page opens → they point their phone camera at the printed marker image → the 3D model appears anchored on the projection.</p>

  <script>
    let qr = null;
    function generate() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) { alert('Enter a URL first'); return; }
      const box = document.getElementById('qr-box');
      box.style.display = 'block';
      box.innerHTML = '';
      qr = new QRCode(box, {
        text: url,
        width: 256,
        height: 256,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }
  </script>
</body>
</html>
