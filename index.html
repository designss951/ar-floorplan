<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Floor Plan Viewer</title>

  <!-- A-Frame MUST load before MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── Loading overlay ── */
    #overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a12; color: #e0e0e0;
      transition: opacity 0.6s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    #overlay h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.2rem; color: #fff; }
    #overlay .sub { font-size: 0.8rem; opacity: 0.5; margin-bottom: 1.5rem; }

    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6ee7b7;
      animation: spin 0.7s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status { font-size: 0.85rem; opacity: 0.7; text-align: center; padding: 0 1rem; }

    /* ── Debug log (toggle with btn) ── */
    #debug {
      position: fixed; top: 50px; left: 8px; z-index: 10000;
      width: calc(100% - 16px); max-height: 40vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.88); color: #0f0;
      font-family: monospace; font-size: 0.62rem;
      padding: 8px; border-radius: 8px;
      display: none;
      word-wrap: break-word;
    }
    #debug.show { display: block; }

    /* ── HUD ── */
    #hud {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9000;
      padding: 12px 16px 28px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none;
      opacity: 0; transition: opacity 0.5s;
    }
    #hud.show { opacity: 1; }

    #instructions-box {
      background: rgba(10,10,18,0.82);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 12px 20px;
      color: #fff; font-size: 0.8rem; text-align: center;
      max-width: 320px; line-height: 1.45;
    }
    #instructions-box strong { color: #6ee7b7; }

    .btn-row {
      display: flex; gap: 8px; pointer-events: auto;
    }
    .btn-row button {
      width: 44px; height: 44px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(10,10,18,0.75);
      backdrop-filter: blur(10px);
      color: #fff; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-row button:active { background: rgba(110,231,183,0.3); }

    /* ── Tracking badge ── */
    #badge {
      position: fixed; top: 8px; left: 8px; z-index: 9000;
      padding: 5px 12px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      background: rgba(10,10,18,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      color: #aaa;
      opacity: 0; transition: opacity 0.5s;
    }
    #badge.show { opacity: 1; }
    #badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444; transition: background 0.3s;
    }
    #badge.tracking .dot { background: #6ee7b7; }
    #badge.tracking { color: #6ee7b7; }

    /* Debug toggle button */
    #btn-debug {
      position: fixed; top: 8px; right: 8px; z-index: 10000;
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(10,10,18,0.8);
      color: #fff; font-size: 0.85rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.5s;
    }
    #btn-debug.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <h1>AR Floor Plan</h1>
    <p class="sub">Augmented Reality Viewer</p>
    <div id="status">Initializing…</div>
  </div>

  <!-- HUD elements -->
  <div id="badge"><span class="dot"></span><span id="badge-text">Searching…</span></div>
  <button id="btn-debug">🛠</button>
  <div id="debug"></div>

  <div id="hud">
    <div id="instructions-box">
      Point your camera at the <strong>printed marker image</strong> on or near the projection.
    </div>
    <div class="btn-row">
      <button id="btn-up" title="Bigger">＋</button>
      <button id="btn-dn" title="Smaller">－</button>
      <button id="btn-reset" title="Reset">↺</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       A-Frame + MindAR Scene
       ═══════════════════════════════════════════ -->
  <a-scene
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: true;
      uiLoading: no;
      uiScanning: no;
      uiError: no;
      filterMinCF: 0.0001;
      filterBeta: 1000;
      missTolerance: 10;
      warmupTolerance: 8;
    "
    color-space="sRGB"
    embedded
    renderer="
      colorManagement: true;
      antialias: true;
      alpha: true;
      logarithmicDepthBuffer: true;
    "
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets timeout="30000">
      <a-asset-item id="model-asset" src="./model.glb"></a-asset-item>
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
      cursor="fuse: false; rayOrigin: mouse;"
    ></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="ar-model"
        src="#model-asset"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.1 0.1 0.1"
        visible="true"
      ></a-gltf-model>
    </a-entity>
  </a-scene>


  <script>
    /* ═══ Debug logger ═══ */
    const debugEl = document.getElementById('debug');
    const logLines = [];
    function log(msg) {
      const ts = new Date().toLocaleTimeString();
      logLines.push('[' + ts + '] ' + msg);
      if (logLines.length > 100) logLines.shift();
      debugEl.innerHTML = logLines.join('<br>');
      debugEl.scrollTop = debugEl.scrollHeight;
      console.log('[AR] ' + msg);
    }

    document.getElementById('btn-debug').addEventListener('click', function() {
      debugEl.classList.toggle('show');
    });

    /* ═══ DOM refs ═══ */
    var overlay   = document.getElementById('overlay');
    var statusEl  = document.getElementById('status');
    var hud       = document.getElementById('hud');
    var badge     = document.getElementById('badge');
    var badgeText = document.getElementById('badge-text');
    var btnDebug  = document.getElementById('btn-debug');
    var model     = document.getElementById('ar-model');

    var currentScale = 0.1;
    var STEP = 0.02;

    log('Page loaded');

    /* ═══ Verify files reachable ═══ */
    fetch('./targets.mind', { method: 'HEAD' }).then(function(r) {
      log('targets.mind: ' + (r.ok ? '✅ reachable (' + r.status + ')' : '❌ NOT FOUND (' + r.status + ')'));
    }).catch(function(e) { log('❌ targets.mind fetch error: ' + e.message); });

    fetch('./model.glb', { method: 'HEAD' }).then(function(r) {
      log('model.glb: ' + (r.ok ? '✅ reachable (' + r.status + ')' : '❌ NOT FOUND (' + r.status + ')'));
    }).catch(function(e) { log('❌ model.glb fetch error: ' + e.message); });

    /* ═══ Scene lifecycle ═══ */
    var sceneEl = document.querySelector('a-scene');

    sceneEl.addEventListener('loaded', function() {
      log('A-Frame scene element loaded');
      statusEl.textContent = 'Loading AR engine…';
    });

    sceneEl.addEventListener('arReady', function() {
      log('✅ MindAR arReady — camera should now be active');
      statusEl.textContent = 'Camera active — scan the marker';
    });

    sceneEl.addEventListener('arError', function(e) {
      log('❌ arError: ' + JSON.stringify(e.detail || 'unknown'));
      statusEl.textContent = '⚠ Camera error. Allow camera access and reload.';
    });

    sceneEl.addEventListener('renderstart', function() {
      log('A-Frame renderstart fired');
      setTimeout(function() {
        overlay.classList.add('hidden');
        hud.classList.add('show');
        badge.classList.add('show');
        btnDebug.classList.add('show');
        log('Overlay hidden — UI active');
      }, 800);
    });

    /* ═══ Asset events ═══ */
    var assetsEl = document.querySelector('a-assets');
    if (assetsEl) {
      assetsEl.addEventListener('loaded', function() {
        log('✅ <a-assets> fully loaded');
      });
      assetsEl.addEventListener('timeout', function() {
        log('⚠ <a-assets> timed out — model may not have loaded');
      });
    }

    model.addEventListener('model-loaded', function() {
      log('✅ GLB model parsed — 3D content ready');
    });
    model.addEventListener('model-error', function(e) {
      log('❌ GLB model error: ' + (e.detail ? e.detail.message || JSON.stringify(e.detail) : 'unknown'));
    });

    /* ═══ Tracking ═══ */
    var targetEl = document.querySelector('[mindar-image-target]');

    targetEl.addEventListener('targetFound', function() {
      log('🎯 TARGET FOUND — model anchored');
      badge.classList.add('tracking');
      badgeText.textContent = 'Tracking ✓';
    });

    targetEl.addEventListener('targetLost', function() {
      log('🔍 Target lost');
      badge.classList.remove('tracking');
      badgeText.textContent = 'Searching…';
    });

    /* ═══ Controls ═══ */
    document.getElementById('btn-up').addEventListener('click', function() {
      currentScale = Math.min(currentScale + STEP, 5);
      model.setAttribute('scale', currentScale + ' ' + currentScale + ' ' + currentScale);
      log('Scale ↑ ' + currentScale.toFixed(3));
    });
    document.getElementById('btn-dn').addEventListener('click', function() {
      currentScale = Math.max(currentScale - STEP, 0.005);
      model.setAttribute('scale', currentScale + ' ' + currentScale + ' ' + currentScale);
      log('Scale ↓ ' + currentScale.toFixed(3));
    });
    document.getElementById('btn-reset').addEventListener('click', function() {
      currentScale = 0.1;
      model.setAttribute('scale', '0.1 0.1 0.1');
      model.setAttribute('position', '0 0 0');
      model.setAttribute('rotation', '0 0 0');
      log('Reset to defaults');
    });

    /* ═══ Global error catching ═══ */
    window.addEventListener('error', function(e) {
      log('❌ JS: ' + e.message + ' @ ' + (e.filename || '') + ':' + (e.lineno || ''));
    });
    window.addEventListener('unhandledrejection', function(e) {
      log('❌ Promise: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
    });

    /* ═══ Safety timeout ═══ */
    setTimeout(function() {
      if (!overlay.classList.contains('hidden')) {
        log('⚠ 20s timeout — scene may have stalled');
        statusEl.textContent = 'Still loading… check camera permission or reload.';
      }
    }, 20000);
  </script>
</body>
</html>
